version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: threat_intelligence_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: threat_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - threat_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threat_intelligence_backend
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/threat_intelligence
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - threat_network
    restart: unless-stopped
    volumes:
      - ./backend:/app

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: threat_intelligence_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - threat_network
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000

  n8n:
    image: n8nio/n8n:latest
    container_name: threat_intelligence_n8n
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_ENCRYPTION_KEY: your_encryption_key_here
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
    depends_on:
      - postgres
    networks:
      - threat_network
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:

networks:
  threat_network:
    driver: bridge